<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eKYC review console</title>
<link rel="stylesheet" href="screen.css">
</head>
<body>
<div class="scr-head">
  <span class="scr-fill">Applicant</span>
  <span style="width:160px">Doc match</span>
  <span style="width:80px">Liveness</span>
  <span style="width:70px">Verdict</span>
</div>
<div class="scr-row">
  <span class="scr-fill">Narin Suksai · <span class="scr-num">1-1035-xxxxx-42-8</span></span>
  <span style="width:160px"><span class="scr-bar" style="width:112px"><i style="width:97%"></i></span> <span class="scr-num">97%</span></span>
  <span class="scr-num" style="width:80px">98%</span>
  <span style="width:70px"><span class="scr-chip ok">pass</span></span>
</div>
<div class="scr-row">
  <span class="scr-fill">Pimchanok Rattanakul · <span class="scr-num">3-2011-xxxxx-09-4</span></span>
  <span style="width:160px"><span class="scr-bar" style="width:96px"><i style="width:81%"></i></span> <span class="scr-num">81%</span></span>
  <span class="scr-num" style="width:80px">84%</span>
  <span style="width:70px"><span class="scr-chip warn">review</span></span>
</div>
<div class="scr-row">
  <span class="scr-fill">Thanawat Chaiyo · <span class="scr-num">1-4490-xxxxx-31-6</span></span>
  <span style="width:160px"><span class="scr-bar" style="width:72px"><i style="width:52%"></i></span> <span class="scr-num">52%</span></span>
  <span class="scr-num" style="width:80px">54%</span>
  <span style="width:70px"><span class="scr-chip err">fail</span></span>
</div>
<div class="scr-row">
  <span class="scr-fill">Kanyarat Boonmee · <span class="scr-num">2-7506-xxxxx-18-2</span></span>
  <span style="width:160px"><span class="scr-bar" style="width:104px"><i style="width:94%"></i></span> <span class="scr-num">94%</span></span>
  <span class="scr-num" style="width:80px">92%</span>
  <span style="width:70px"><span class="scr-chip ok">pass</span></span>
</div>
<div class="scr-section">
  <div class="scr-row"><span class="scr-sub scr-fill">queue · 12 pending</span><span class="scr-key">NEXT CASE</span></div>
</div>
</body>
</html>
