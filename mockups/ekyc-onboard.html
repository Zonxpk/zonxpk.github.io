<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eKYC onboarding</title>
<link rel="stylesheet" href="screen.css">
</head>
<body>
<div class="scr-step" style="border-top:0"><span class="scr-fill">1 · ID DOCUMENT</span><span class="scr-chip ok">done</span></div>
<div class="scr-step"><span class="scr-fill">2 · LIVENESS</span><span class="scr-chip acc">active</span></div>
<div class="scr-step"><span class="scr-fill">3 · REVIEW</span><span class="scr-chip">waiting</span></div>
<div class="scr-section">
  <div style="border:1px solid var(--ink);height:120px;display:grid;place-items:center">
    <span class="scr-sub">align face in frame</span>
  </div>
  <div class="scr-row"><span class="scr-fill">good lighting</span><span class="scr-num">✓</span></div>
  <div class="scr-row"><span class="scr-fill">no glasses</span><span class="scr-num">✓</span></div>
  <div class="scr-row"><span class="scr-fill">hold still</span><span class="scr-num">…</span></div>
</div>
<div class="scr-section"><span class="scr-key">CONTINUE</span></div>
</body>
</html>
