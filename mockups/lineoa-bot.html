<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chat lead bot</title>
<link rel="stylesheet" href="screen.css">
</head>
<body>
<div class="scr-chat">
  <div class="scr-msg">Reminder: lead L-2094 'Chai Yen kiosk' has no contact in 3 days. Next action?</div>
  <div class="scr-msg">
    <div class="scr-title">L-2094 · Chai Yen</div>
    <div class="scr-sub">zone B1 · 12 m² · ฿38,000/mo</div>
    <span class="scr-chip acc">negotiation</span>
  </div>
  <div class="scr-msg me">Booked call Thu 10:00 ✓</div>
  <div class="scr-msg">Logged. Status → follow-up scheduled.</div>
</div>
<div class="scr-row" style="margin-top:14px">
  <span class="scr-sub">pipeline</span>
  <span class="scr-fill"></span>
  <span class="scr-chip ok">12 active</span>
  <span class="scr-chip warn">3 stale</span>
</div>
</body>
</html>
