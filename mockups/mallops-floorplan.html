<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Floorplan occupancy</title>
<link rel="stylesheet" href="screen.css">
</head>
<body>
<div class="scr-row" style="border-top:0;padding-top:0">
  <span class="scr-title">Zone B2 · BR-0412</span>
  <span class="scr-fill"></span>
  <span class="scr-chip acc">occupancy 92%</span>
</div>
<div class="scr-section">
  <div class="scr-cellgrid" style="grid-template-columns:repeat(8,1fr)">
    <span class="scr-cell occ" style="min-height:26px"></span>
    <span class="scr-cell occ" style="min-height:34px"></span>
    <span class="scr-cell evt" style="min-height:22px"></span>
    <span class="scr-cell occ" style="min-height:30px"></span>
    <span class="scr-cell" style="min-height:26px"></span>
    <span class="scr-cell occ" style="min-height:34px"></span>
    <span class="scr-cell occ" style="min-height:24px"></span>
    <span class="scr-cell occ" style="min-height:30px"></span>
    <span class="scr-cell occ" style="min-height:32px"></span>
    <span class="scr-cell" style="min-height:22px"></span>
    <span class="scr-cell occ" style="min-height:28px"></span>
    <span class="scr-cell occ" style="min-height:34px"></span>
    <span class="scr-cell evt" style="min-height:26px"></span>
    <span class="scr-cell occ" style="min-height:30px"></span>
    <span class="scr-cell" style="min-height:24px"></span>
    <span class="scr-cell occ" style="min-height:32px"></span>
  </div>
</div>
<div class="scr-section">
  <div class="scr-row">
    <span class="scr-sub">revenue overlay · ฿/m²</span>
    <span class="scr-fill"></span>
    <span class="scr-spark" style="width:112px"><i style="height:38%"></i><i style="height:56%"></i><i style="height:48%"></i><i style="height:76%"></i><i style="height:64%"></i><i style="height:92%"></i></span>
  </div>
</div>
<div class="scr-section">
  <span class="scr-key">BOOK EVENT</span>
  <span class="scr-key">OVERLAYS ▾</span>
</div>
</body>
</html>
