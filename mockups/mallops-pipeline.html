<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Report pipeline</title>
<link rel="stylesheet" href="screen.css">
</head>
<body>
<div class="scr-title">Monthly consolidation</div>
<div class="scr-sub">2,148 branches · run #47</div>
<div class="scr-section">
  <div class="scr-head">
    <span style="width:76px">Region</span>
    <span style="width:64px">Branches</span>
    <span style="width:104px">Validated</span>
    <span class="scr-fill">State</span>
  </div>
  <div class="scr-row">
    <span class="scr-num" style="width:76px">BKK-C</span>
    <span class="scr-num" style="width:64px">512</span>
    <span class="scr-bar" style="width:104px"><i style="width:100%"></i></span>
    <span class="scr-fill"></span>
    <span class="scr-chip ok">done</span>
  </div>
  <div class="scr-row">
    <span class="scr-num" style="width:76px">NORTH</span>
    <span class="scr-num" style="width:64px">486</span>
    <span class="scr-bar" style="width:104px"><i style="width:74%"></i></span>
    <span class="scr-fill"></span>
    <span class="scr-chip acc">running</span>
  </div>
  <div class="scr-row">
    <span class="scr-num" style="width:76px">NE</span>
    <span class="scr-num" style="width:64px">590</span>
    <span class="scr-bar" style="width:104px"><i style="width:12%"></i></span>
    <span class="scr-fill"></span>
    <span class="scr-chip">queued</span>
  </div>
  <div class="scr-row">
    <span class="scr-num" style="width:76px">SOUTH</span>
    <span class="scr-num" style="width:64px">560</span>
    <span class="scr-bar" style="width:104px"><i style="width:0%"></i></span>
    <span class="scr-fill"></span>
    <span class="scr-chip warn">2 rejected</span>
  </div>
</div>
<div class="scr-section">
  <div class="scr-row">
    <span class="scr-sub">overall validation</span>
    <span class="scr-fill"><span class="scr-bar" style="width:100%"><i style="width:46%"></i></span></span>
    <span class="scr-num">46%</span>
  </div>
</div>
<div class="scr-section">
  <span class="scr-key">EXPORT XLSX</span>
  <span class="scr-key">VALIDATION LOG</span>
</div>
</body>
</html>
