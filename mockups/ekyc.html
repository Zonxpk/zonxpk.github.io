<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b2447">
  <title>Verify identity | Nara Bank</title>
  <style>
    :root {
      color-scheme: light;
      --navy-950: #071b37;
      --navy-900: #0b2447;
      --navy-800: #12345d;
      --navy-700: #1a456f;
      --mint-50: #eefbf8;
      --mint-100: #d9f5ee;
      --mint-300: #7fddca;
      --teal-500: #19a98d;
      --teal-600: #108d77;
      --teal-700: #0b725f;
      --slate-900: #15243a;
      --slate-700: #41536a;
      --slate-500: #718096;
      --slate-300: #cbd6df;
      --slate-200: #dde5eb;
      --canvas: #f1f6f6;
      --surface: #fbfdfd;
      --white: #ffffff;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --radius-control: 10px;
      --radius-card: 16px;
      --radius-viewfinder: 12px;
      --shadow-card:
        0 8px 22px rgba(7, 34, 64, 0.07),
        0 1px 3px rgba(7, 34, 64, 0.05);
      --shadow-button:
        0 7px 14px rgba(16, 141, 119, 0.20),
        0 2px 4px rgba(7, 34, 64, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      background: var(--canvas);
      color: var(--slate-900);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button {
      font: inherit;
    }

    .screen {
      width: 100%;
      height: 100%;
      background: var(--canvas);
      overflow: hidden;
    }

    .app-header {
      height: 108px;
      padding: 8px 16px 16px;
      color: var(--white);
      background:
        linear-gradient(132deg, rgba(127, 221, 202, 0.08), transparent 42%),
        var(--navy-900);
      box-shadow: 0 3px 12px rgba(7, 27, 55, 0.16);
    }

    .app-bar {
      height: 52px;
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .back-button {
      width: 44px;
      height: 44px;
      margin-left: -10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 44px;
      border: 0;
      border-radius: var(--radius-control);
      color: var(--white);
      background: transparent;
      touch-action: manipulation;
    }

    .back-button:focus-visible,
    .primary-button:focus-visible {
      outline: 3px solid var(--mint-300);
      outline-offset: 2px;
    }

    .back-button:active {
      background: rgba(255, 255, 255, 0.10);
    }

    .back-button svg {
      width: 22px;
      height: 22px;
      transform: translateX(-1px);
    }

    .bar-title {
      min-width: 0;
      margin: 0;
      flex: 1;
      color: var(--white);
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.012em;
      text-wrap: balance;
    }

    .step-count {
      min-width: 52px;
      height: 28px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(217, 245, 238, 0.20);
      border-radius: 999px;
      background: rgba(217, 245, 238, 0.10);
      color: var(--mint-100);
      font-size: 11px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .progress-track {
      height: 5px;
      margin-top: 11px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
    }

    .progress-value {
      width: 66.666%;
      height: 100%;
      border-radius: inherit;
      background: var(--mint-300);
      box-shadow: 0 0 0 1px rgba(217, 245, 238, 0.12);
    }

    main {
      height: calc(100% - 108px);
      padding: 12px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .capture-card {
      height: 268px;
      padding: 12px;
      flex: 0 0 268px;
      overflow: hidden;
      border: 1px solid rgba(11, 36, 71, 0.055);
      border-radius: var(--radius-card);
      background: var(--surface);
      box-shadow: var(--shadow-card);
    }

    .viewfinder {
      position: relative;
      width: 100%;
      height: 206px;
      overflow: hidden;
      border: 1px solid rgba(11, 36, 71, 0.12);
      border-radius: var(--radius-viewfinder);
      background:
        radial-gradient(circle at 50% 44%, rgba(127, 221, 202, 0.16), transparent 45%),
        linear-gradient(150deg, #e9f5f2 0%, #dce9ea 100%);
      box-shadow:
        inset 0 2px 7px rgba(7, 34, 64, 0.08),
        inset 0 0 0 1px rgba(255, 255, 255, 0.55);
    }

    .viewfinder::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 32%);
    }

    .face-guide {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    .capture-hint {
      min-height: 36px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 7px;
      color: var(--slate-700);
      font-size: 14px;
      font-weight: 500;
      text-align: center;
    }

    .capture-hint svg {
      width: 17px;
      height: 17px;
      flex: 0 0 17px;
      color: var(--teal-600);
    }

    .checklist-card {
      height: 128px;
      padding: 7px 14px;
      flex: 0 0 128px;
      border: 1px solid rgba(11, 36, 71, 0.055);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow-card);
    }

    .checklist {
      height: 100%;
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .checklist li {
      min-height: 37px;
      display: flex;
      align-items: center;
      gap: 11px;
      color: var(--slate-700);
      font-size: 14px;
      font-weight: 500;
    }

    .checklist li + li {
      border-top: 1px solid rgba(11, 36, 71, 0.065);
    }

    .status-icon {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 22px;
      border-radius: 50%;
    }

    .status-icon.complete {
      color: var(--white);
      background: var(--teal-500);
      box-shadow: 0 2px 5px rgba(25, 169, 141, 0.18);
    }

    .status-icon.pending {
      color: var(--teal-700);
      background: var(--mint-100);
      border: 1px solid rgba(16, 141, 119, 0.16);
    }

    .status-icon svg {
      width: 14px;
      height: 14px;
    }

    .primary-button {
      width: 100%;
      height: 52px;
      min-height: 52px;
      padding: 0 22px;
      flex: 0 0 52px;
      border: 1px solid rgba(7, 34, 64, 0.06);
      border-radius: var(--radius-control);
      background: var(--teal-600);
      color: var(--white);
      box-shadow: var(--shadow-button);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.005em;
      touch-action: manipulation;
    }

    .primary-button:active {
      background: var(--teal-700);
      transform: scale(0.98);
    }

    .trust-footer {
      height: 24px;
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--slate-500);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .trust-footer svg {
      width: 13px;
      height: 13px;
      color: var(--teal-700);
    }

    @media (hover: hover) and (pointer: fine) {
      .back-button:hover {
        background: rgba(255, 255, 255, 0.09);
      }

      .primary-button:hover {
        background: var(--teal-700);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .primary-button {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <header class="app-header">
      <div class="app-bar">
        <button class="back-button" type="button" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <h1 class="bar-title">Verify identity</h1>
        <span class="step-count">2 of 3</span>
      </div>
      <div class="progress-track" role="progressbar" aria-label="Identity verification progress" aria-valuemin="1" aria-valuemax="3" aria-valuenow="2">
        <div class="progress-value"></div>
      </div>
    </header>

    <main>
      <section class="capture-card" aria-label="Face capture">
        <div class="viewfinder">
          <svg class="face-guide" viewBox="0 0 264 210" fill="none" aria-hidden="true">
            <defs>
              <linearGradient id="portraitFill" x1="132" y1="52" x2="132" y2="181" gradientUnits="userSpaceOnUse">
                <stop stop-color="#9BB2BC" stop-opacity=".20"/>
                <stop offset="1" stop-color="#5D7886" stop-opacity=".08"/>
              </linearGradient>
              <filter id="softShadow" x="46" y="28" width="172" height="174" filterUnits="userSpaceOnUse">
                <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0B2447" flood-opacity=".08"/>
              </filter>
            </defs>

            <path d="M88 182c5-35 22-52 44-52s39 17 44 52" fill="url(#portraitFill)"/>
            <circle cx="132" cy="96" r="35" fill="url(#portraitFill)"/>

            <ellipse cx="132" cy="105" rx="67" ry="84" stroke="#108D77" stroke-width="2" stroke-dasharray="5 6" opacity=".88" filter="url(#softShadow)"/>

            <path d="M54 66V45c0-6 5-11 11-11h21M210 66V45c0-6-5-11-11-11h-21M54 144v21c0 6 5 11 11 11h21M210 144v21c0 6-5 11-11 11h-21"
              stroke="#0B725F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

            <circle cx="132" cy="105" r="3" fill="#108D77"/>
            <path d="M124 115c2.2 2 4.8 3 8 3s5.8-1 8-3" stroke="#108D77" stroke-width="1.5" stroke-linecap="round" opacity=".55"/>
          </svg>
        </div>
        <div class="capture-hint">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M8 6.5l1.2-2h5.6l1.2 2h2.5A2.5 2.5 0 0121 9v7.5a2.5 2.5 0 01-2.5 2.5h-13A2.5 2.5 0 013 16.5V9a2.5 2.5 0 012.5-2.5H8z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <circle cx="12" cy="12.5" r="3.3" stroke="currentColor" stroke-width="1.8"/>
          </svg>
          <span>Position your face in the frame</span>
        </div>
      </section>

      <section class="checklist-card" aria-label="Before you begin">
        <ul class="checklist">
          <li>
            <span class="status-icon complete">
              <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M3.5 8.2l2.7 2.7 6.3-6.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span>Good lighting</span>
          </li>
          <li>
            <span class="status-icon complete">
              <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M3.5 8.2l2.7 2.7 6.3-6.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span>Remove glasses</span>
          </li>
          <li>
            <span class="status-icon pending">
              <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                <circle cx="3" cy="8" r="1.25"/>
                <circle cx="8" cy="8" r="1.25"/>
                <circle cx="13" cy="8" r="1.25"/>
              </svg>
            </span>
            <span>Hold still</span>
          </li>
        </ul>
      </section>

      <button class="primary-button" type="button">Start liveness check</button>

      <footer class="trust-footer">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="3.25" y="7" width="9.5" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5.5 7V5.25a2.5 2.5 0 015 0V7M8 10v1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Encrypted · PDPA compliant</span>
      </footer>
    </main>
  </div>
</body>
</html>
