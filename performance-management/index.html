<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ผลการประเมินและข้อมูลเชิงลึก · empeo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --brand1:#FF7E3D; --brand2:#FF556E;
    --bg:#F5F5F3; --card:#FFFFFF; --ink:#1F2430; --muted:#767C89; --line:#ECECEC;
    --self:#6366F1; --mgr:#F97316; --peer:#14B8A6; --org:#64748B;
    --green:#16A34A; --amber:#D97706; --blue:#2563EB; --red:#DC2626;
    --green-bg:#E7F6EC; --amber-bg:#FBF0DE; --blue-bg:#E5EDFB; --red-bg:#FBE7E7;
    --r:16px; --r-sm:10px; --shadow:0 1px 3px rgba(24,29,45,.06), 0 8px 24px rgba(24,29,45,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans Thai",system-ui,-apple-system,sans-serif;
    font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:960px;margin:0 auto;padding:20px 20px 80px}
  h2{font-size:16px;font-weight:700;margin:0 0 2px}
  .sub{color:var(--muted);font-size:12.5px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
  .sec-title{display:flex;align-items:baseline;gap:8px;margin:0 0 14px}
  .sec-title small{color:var(--muted);font-weight:400;font-size:12px}

  /* sticky bar */
  #sticky{position:fixed;top:0;left:0;right:0;z-index:40;transform:translateY(-110%);
    transition:transform .25s ease;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);box-shadow:0 4px 14px rgba(24,29,45,.06)}
  #sticky.show{transform:translateY(0)}
  #sticky .inner{max-width:960px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:12px}
  #sticky .av{width:30px;height:30px;border-radius:50%;object-fit:cover}
  #sticky .nm{font-weight:600}
  #sticky .cyc{color:var(--muted);font-size:12.5px}
  #sticky .spacer{flex:1}
  .chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;
    padding:3px 11px;font-size:12.5px;font-weight:600}
  .grade-Excellence{background:#DFF4E8;color:#0F7A45}
  .grade-Exceeds{background:#E5EDFB;color:#2258C9}
  .grade-Meets{background:#FBF0DE;color:#B26905}
  .grade-Below{background:#FBE7E7;color:#C22}

  /* header / verdict */
  .hero{background:linear-gradient(120deg,var(--brand1),var(--brand2));
    color:#fff;border-radius:var(--r);padding:22px 24px;margin-bottom:16px;
    box-shadow:0 10px 30px rgba(255,90,110,.28)}
  .hero-top{display:flex;gap:16px;align-items:center}
  .hero .av{width:60px;height:60px;border-radius:50%;border:3px solid rgba(255,255,255,.5);object-fit:cover;background:#fff}
  .hero .nm{font-size:20px;font-weight:800;line-height:1.2}
  .hero .role{opacity:.92;font-size:13px;margin-top:2px}
  .hero .spacer{flex:1}
  .hero .score-big{text-align:right}
  .hero .score-big .pct{font-size:34px;font-weight:800;line-height:1}
  .hero .score-big .gd{display:inline-block;margin-top:6px;background:rgba(255,255,255,.22);
    border-radius:999px;padding:3px 12px;font-weight:700;font-size:12.5px}
  .hero .synth{margin-top:16px;font-size:13.5px;opacity:.96;max-width:620px}
  .rec{margin-top:14px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);
    border-radius:12px;padding:12px 14px;display:flex;flex-wrap:wrap;gap:8px 18px;align-items:center}
  .rec .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;opacity:.85;width:100%}
  .rec b{font-weight:700}
  .rec .item{font-size:13.5px}

  .cycle-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  .cycle-row .seg{display:inline-flex;background:#EDEDEA;border-radius:999px;padding:3px}
  .cycle-row .seg button{border:0;background:transparent;padding:5px 14px;border-radius:999px;
    font:inherit;font-size:13px;color:var(--muted);cursor:pointer;font-weight:600}
  .cycle-row .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12)}

  /* legend + toggles */
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .src-toggle{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);
    background:#fff;border-radius:999px;padding:5px 12px;cursor:pointer;font:inherit;font-size:12.5px;
    color:var(--ink);font-weight:600;user-select:none}
  .src-toggle .dot{width:10px;height:10px;border-radius:50%}
  .src-toggle.off{opacity:.4;text-decoration:line-through}

  /* scorecard tracks */
  .dim{padding:14px 0;border-bottom:1px solid var(--line)}
  .dim:last-child{border-bottom:0;padding-bottom:0}
  .dim-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .dim-name{font-weight:600;font-size:14px}
  .dim-weight{color:var(--muted);font-size:12px}
  .dim-score{margin-left:auto;font-weight:700;font-size:15px}
  .badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:2px 10px;
    font-size:11.5px;font-weight:600;cursor:help}
  .b-green{background:var(--green-bg);color:var(--green)}
  .b-amber{background:var(--amber-bg);color:var(--amber)}
  .b-blue{background:var(--blue-bg);color:var(--blue)}
  .b-red{background:var(--red-bg);color:var(--red)}
  .track{position:relative;height:26px;margin:0 6px}
  .track-line{position:absolute;top:50%;left:0;right:0;height:6px;transform:translateY(-50%);
    background:#EEF0F3;border-radius:6px}
  .track-bar{position:absolute;top:50%;left:0;height:6px;transform:translateY(-50%);
    background:linear-gradient(90deg,rgba(255,126,61,.35),rgba(255,85,110,.45));border-radius:6px}
  .marker{position:absolute;top:50%;width:15px;height:15px;border-radius:50%;
    transform:translate(-50%,-50%);border:2.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.28);cursor:help}
  .track-scale{position:absolute;top:26px;left:0;right:0;display:flex;justify-content:space-between;
    color:#B4B9C2;font-size:10px}

  /* trend + peer */
  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .mini-dims{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:12px}
  .mini-dims span{font-size:12px;color:var(--muted)}
  .mini-dims b{color:var(--ink)}
  .up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--muted)}
  .dist{display:flex;align-items:flex-end;gap:8px;height:110px;margin-top:8px}
  .dist .bar{flex:1;background:#E7E9EE;border-radius:6px 6px 0 0;position:relative;transition:.2s}
  .dist .bar.you{background:linear-gradient(180deg,var(--brand1),var(--brand2))}
  .dist .bar .cap{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:10.5px;color:var(--muted)}
  .dist .bar .me{position:absolute;top:-20px;left:0;right:0;text-align:center;font-size:11px;font-weight:700;color:var(--brand2)}
  .pctile{margin-top:30px;font-size:13px}
  .pctile b{color:var(--brand2)}

  /* synthesis */
  .syn{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .syn .col h4{margin:0 0 8px;font-size:13px}
  .syn ul{margin:0;padding-left:2px;list-style:none}
  .syn li{display:flex;gap:8px;padding:6px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .syn li:last-child{border-bottom:0}
  .syn li .ic{flex:none;width:18px;text-align:center}
  .quote{background:#FAFAF8;border-left:3px solid var(--brand1);border-radius:0 8px 8px 0;
    padding:8px 12px;margin-top:10px;font-size:12.5px;color:#4A505C}

  /* detail table */
  details{border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:10px;overflow:hidden}
  summary{list-style:none;cursor:pointer;padding:12px 14px;display:flex;align-items:center;gap:10px;
    font-weight:600;background:#FBFBFA}
  summary::-webkit-details-marker{display:none}
  summary .caret{transition:.2s;color:var(--muted)}
  details[open] summary .caret{transform:rotate(90deg)}
  summary .wt{margin-left:auto;color:var(--muted);font-weight:500;font-size:12px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{padding:9px 14px;text-align:left;border-top:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:11.5px}
  td.num,th.num{text-align:center;width:64px}
  .cmt{color:var(--muted);font-size:11.5px;padding:2px 14px 12px}

  /* decision panel */
  .dec-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
  .field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;
    padding:9px 11px;font:inherit;font-size:14px;color:var(--ink)}
  .field textarea{resize:vertical;min-height:64px}
  .field .hint{font-size:11px;color:var(--muted);margin-top:4px}
  .why{background:#FAFAF8;border:1px dashed var(--line);border-radius:12px;padding:12px 14px;
    margin-top:16px;font-size:13px;line-height:1.7}
  .why .k{color:var(--muted)}
  .readiness{display:inline-flex;gap:8px;align-items:center;font-weight:700;margin-top:6px}
  .btn{margin-top:16px;border:0;background:linear-gradient(120deg,var(--brand1),var(--brand2));
    color:#fff;font:inherit;font-weight:700;padding:11px 20px;border-radius:12px;cursor:pointer;
    box-shadow:0 6px 16px rgba(255,90,110,.3)}
  .jump{border:1px solid rgba(255,255,255,.6);background:transparent;color:#fff;
    border-radius:999px;padding:6px 14px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer}
  #sticky .jump{border-color:var(--brand2);color:var(--brand2)}

  @media(max-width:720px){
    .two,.syn,.dec-grid{grid-template-columns:1fr}
    .hero-top{flex-wrap:wrap}.hero .score-big{text-align:left}
  }
</style>
</head>

/* ---------------- STATE ---------------- */
const STATE = {
  emp:'bank',
  cycle:'2025',
  visible:{self:true, manager:true, peer:true, org:true},

};

/* ---------------- HELPERS ---------------- */
const emp = () => DATA.employees[STATE.emp];
const cyc = () => emp().cycles[STATE.cycle];
const round1 = x => Math.round(x*10)/10;

function overallPct(cycleKey){
  const c = emp().cycles[cycleKey];
  const tot = c.dims.reduce((a,d)=>a+d.weight,0);
  const w = c.dims.reduce((a,d)=>a + d.final*d.weight, 0)/tot; // 0..5
  return Math.round(w*20); // %
}
function gradeBand(pct){
  if(pct>=90) return 'Excellence';
  if(pct>=80) return 'Exceeds';
  if(pct>=65) return 'Meets';
  return 'Below';
}
const GRADE_TH = {Excellence:'ดีเยี่ยม', Exceeds:'เกินความคาดหวัง', Meets:'ตามเป้าหมาย', Below:'ต่ำกว่าเป้าหมาย'};

function trendDir(){ // slope over available cycles
  const t = emp().trend; const d = t[t.length-1].pct - t[0].pct;
  return d>=4 ? 'up' : d<=-4 ? 'down' : 'flat';
}

function gapFlag(dim){
  const s = dim.src;
  const others = (s.manager + s.peer + s.org)/3;
  const spread = Math.max(s.self,s.manager,s.peer,s.org) - Math.min(s.self,s.manager,s.peer,s.org);
  if(s.self - others >= 1.0)
    return {cls:'b-amber', label:'อาจเป็นจุดบอด', tip:`ประเมินตนเอง ${round1(s.self)} สูงกว่ามุมมองผู้อื่น (${round1(others)}) — อาจมองไม่เห็นจุดที่ต้องพัฒนา`};
  if(others - s.self >= 1.0)
    return {cls:'b-blue', label:'ประเมินตนเองต่ำไป', tip:`ผู้อื่นให้คะแนน ${round1(others)} สูงกว่าที่ประเมินตนเอง (${round1(s.self)}) — มั่นใจในตัวเองได้มากขึ้น`};
  if(Math.abs(s.manager - s.peer) >= 1.0)
    return {cls:'b-red', label:'ต้องปรับเทียบ', tip:`หัวหน้า (${round1(s.manager)}) และเพื่อนร่วมงาน (${round1(s.peer)}) เห็นต่างกันมาก — ควรปรับเทียบมาตรฐาน`};
  if(others>=4.0 && spread<=0.8)
    return {cls:'b-green', label:'จุดแข็งที่สอดคล้อง', tip:`ทุกแหล่งประเมินให้คะแนนสูงและสอดคล้องกัน — จุดแข็งที่ยืนยันได้`};
  return {cls:'', label:'', tip:''};
}

function recommend(cycleKey){
  const pct = overallPct(cycleKey), band = gradeBand(pct), dir = trendDir();
  const pctile = emp().cycles[cycleKey].peer.percentile;
  const meritBase = {Excellence:[8,10], Exceeds:[5,7], Meets:[3,4], Below:[0,2]}[band];
  let merit = meritBase[1]; // top of band, nudged
  if(dir!=='up' && pctile>25) merit = meritBase[0];
  const bonus = {Excellence:1.5, Exceeds:1.2, Meets:1.0, Below:0.5}[band];
  // promotion readiness
  const blindSpot = emp().cycles[cycleKey].dims.some(d=>gapFlag(d).label==='อาจเป็นจุดบอด');
  let promo, ready;
  if(band==='Excellence' && dir==='up' && pctile<=25){ promo='พร้อมเลื่อนตำแหน่ง'; ready='ready'; }
  else if((band==='Excellence'||band==='Exceeds') && dir==='up'){
    promo = blindSpot ? 'เตรียมเลื่อนตำแหน่ง — ปิด gap การทำงานร่วมกันก่อน' : 'เตรียมเลื่อนตำแหน่งภายใน 6 เดือน';
    ready='soon';
  } else { promo='พัฒนาก่อนพิจารณาเลื่อนตำแหน่ง'; ready='hold'; }
  return {pct, band, dir, pctile, merit, bonus, promo, ready};
}

    <div class="legend">${legend}</div>
    ${rows}
  </div>`;
}

function renderTrend(){
  const t = emp().trend, W=260, H=90, pad=24;
  const xs = i => pad + i*(W-2*pad)/(t.length-1);
  const ys = p => H-pad - (p-60)/40*(H-2*pad);
  const pts = t.map((d,i)=>`${xs(i)},${ys(d.pct)}`).join(' ');
  const dots = t.map((d,i)=>`<circle cx="${xs(i)}" cy="${ys(d.pct)}" r="4" fill="var(--brand2)"/>
    <text x="${xs(i)}" y="${ys(d.pct)-10}" text-anchor="middle" font-size="11" font-weight="700" fill="var(--ink)">${d.pct}%</text>
    <text x="${xs(i)}" y="${H-6}" text-anchor="middle" font-size="10" fill="var(--muted)">${d.c}</text>`).join('');
  const mini = cyc().dims.map(d=>{
    const prev = emp().cycles['2024'].dims.find(x=>x.name===d.name);
    const diff = prev ? d.final - prev.final : 0;
    const cls = diff>0.1?'up':diff<-0.1?'down':'flat';
    const arr = diff>0.1?'↗':diff<-0.1?'↘':'→';
    return `<span>${d.name} <b class="${cls}">${arr} ${round1(d.final)}</b></span>`;
  }).join('');
  return `<div class="card">
    <div class="sec-title"><h2>แนวโน้มผลงาน</h2><small>คะแนนรวมย้อนหลัง</small></div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">
      <polyline points="${pts}" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
      <defs><linearGradient id="g"><stop offset="0" stop-color="var(--brand1)"/><stop offset="1" stop-color="var(--brand2)"/></linearGradient></defs>
      ${dots}
    </svg>
    <div class="mini-dims">${mini}</div>
  </div>`;
}

function renderPeer(){

    <div class="bar ${b.you?'you':''}" style="height:${b.n/max*100}%">
      ${b.you?'<span class="me">คุณ</span>':''}
      <span class="cap">${b.r}</span>
    </div>`).join('');
  return `<div class="card">
    <div class="sec-title"><h2>เทียบกับเพื่อนร่วมสายงาน</h2><small>${p.roleLabel}</small></div>
    <div class="dist">${bars}</div>
    <div class="pctile">อยู่ในกลุ่ม <b>${p.percentile}% แรก</b> ของสายงาน · ${DIRTXT[trendDir()]}</div>
  </div>`;
}

function renderSynthesis(){
  const c = cyc();
  const strengths=[], risks=[], quotes=[];
  c.dims.forEach(d=>{
    const g = gapFlag(d);
    if(g.label==='จุดแข็งที่สอดคล้อง' || d.final>=4.3) strengths.push(`${d.name} (${round1(d.final)}/5)`);
    if(g.label==='อาจเป็นจุดบอด') risks.push(`${d.name} — มุมมองตนเองต่างจากทีม`);
    else if(g.label==='ต้องปรับเทียบ') risks.push(`${d.name} — คะแนนจากแหล่งต่าง ๆ ไม่สอดคล้อง`);
    else if(d.final<3.8) risks.push(`${d.name} (${round1(d.final)}/5) — ต่ำกว่าเกณฑ์`);
    if(d.comment) quotes.push(d.comment);
  });
  const li = (arr,ic)=> arr.length? arr.map(x=>`<li><span class="ic">${ic}</span><span>${x}</span></li>`).join('')
                                   : `<li><span class="ic">–</span><span class="sub">ไม่มี</span></li>`;
  return `<div class="card">
    <div class="sec-title"><h2>จุดแข็งและจุดที่ต้องพัฒนา</h2><small>สรุปอัตโนมัติจากผลการประเมินทุกมิติ</small></div>

  </div>`;
}

  const r = recommend(STATE.cycle), d = STATE.decision;

}

  STATE.decision[field] = field==='notes' ? val : parseFloat(val);
  document.getElementById('whyline').innerHTML = whyLine(); // surgical, keeps input focus
}
function jumpDecision(){ document.getElementById('decision').scrollIntoView({behavior:'smooth'}); }

function syncSticky(){
  const e = emp().employee, r = recommend(STATE.cycle);
  document.getElementById('sk-av').src = e.avatar;
  document.getElementById('sk-nm').textContent = e.name;
  document.getElementById('sk-cyc').textContent = cyc().label;
  document.getElementById('sk-grade').innerHTML = `<span class="chip grade-${r.band}">${r.pct}% · ${r.band}</span>`;
}
// show sticky bar once hero scrolls out
const sentinel = ()=>{
  const io = new IntersectionObserver(([en])=>{
    document.getElementById('sticky').classList.toggle('show', !en.isIntersecting && en.boundingClientRect.top<0);
  }, {threshold:0});
  const hero = document.querySelector('.hero');
  if(hero) io.observe(hero);
};

render();
sentinel();
</script>
</body>
</html>
